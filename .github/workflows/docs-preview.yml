name: Docs Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    name: Build & Deploy Preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Zensical and Smokeshow
        run: pip install zensical smokeshow

      - name: Build docs
        run: zensical build

      - name: Generate Smokeshow key
        if: env.SMOKESHOW_AUTH_KEY == ''
        env:
          SMOKESHOW_AUTH_KEY: ${{ secrets.SMOKESHOW_AUTH_KEY }}
        run: |
          KEY=$(smokeshow generate-key 2>/dev/null | tail -1)
          echo "SMOKESHOW_AUTH_KEY=$KEY" >> "$GITHUB_ENV"

      - name: Deploy to Smokeshow
        id: smokeshow
        env:
          SMOKESHOW_AUTH_KEY: ${{ secrets.SMOKESHOW_AUTH_KEY || env.SMOKESHOW_AUTH_KEY }}
          SMOKESHOW_GITHUB_STATUS_DESCRIPTION: Docs preview
          SMOKESHOW_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SMOKESHOW_GITHUB_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          smokeshow upload site 2>&1 | tee /tmp/smokeshow_output.txt
          URL=$(grep -o 'https://[^ ]*\.smokeshow\.link' /tmp/smokeshow_output.txt | head -1)
          echo "preview_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Comment PR with preview URL
        if: steps.smokeshow.outputs.preview_url != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: docs-preview
          message: |
            ## 📖 Docs Preview

            Preview of the documentation for this PR:

            🔗 **${{ steps.smokeshow.outputs.preview_url }}**

            <sub>Built from ${{ github.event.pull_request.head.sha }}</sub>
